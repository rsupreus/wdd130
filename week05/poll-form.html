<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 | HTML Form - User Poll</title>
    <meta name="description"
      content="HTML Form - User Poll: Creating a poll from to record user input">
    <meta name="author" content="RoseDana Supreus">
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>
    <main>
        <form>
            <fieldset class="section">
                <legend>Contact Information</legend>
                <div class="form-item column2">
                    <label for="fullname">Full Name: </label>
                    <input type="text" id="fullname" required>
                    <!-- </div>
                <div class="form-item column2"> -->
                    <label for="useremail">Email: </label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>
            </fieldset>

            <fieldset class="section">
                <legend>Questions</legend>
                <div class="form-item column1">
                    <label for="browser">What is your favorite browser? </label>
                    <select name="browser" id="browsae">
                        <option value="1">Chrome</option>
                        <option value="2">Safari</option>
                        <option value="3">Microsoft Edge</option>
                        <option value="4">Firefox</option>
                        <option value="5">Other</option>
                    </select>
                </div>
                <div class="form-item column1">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>
                <div class="form-item column1">
                    <label for="feedback">List the places you have lived:</label>
                    <textarea id="feedback" name="feedback" rows="4"
                      placeholder="Florida, Texas, Nevada, Utah"></textarea>
                </div>
            </fieldset>
            <button type="submit">Submit Poll</button>
        </form>
    </main>
    <footer>
        <p>©️2026 | HTML Form - User Poll Activity | RoseDana Supreus</p>
    </footer>
</body>


</html>
