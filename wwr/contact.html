<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us and the Reckless Abandon Rafting Company</title>
    <meta name="description"
      content="Whitewater Rafting Site Project - Contact information for Reckless Abandon Rafting Company">
    <meta name="author" content="RoseDana Supreus">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-boat-splash.png" alt="Reckless Rafting">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="company">
            <h1>Reckless Abandon Rafting Company</h1>
            <article>
                <p>641 US-89<br>Kanab, Utah<br>+1 999 999 9999<br>info@recklessrafting.com</p>
            </article>
        </div>

        <div class="map">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d50946.69359129671!2d-112.56184247406361!3d37.053471179417016!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8734d6a55e781603%3A0xf88b6064b3b71813!2sGrand%20Canyon%20Expeditions!5e0!3m2!1sen!2sus!4v1771437345609!5m2!1sen!2sus"
              allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
            <form class="form">
                <div class="form-row">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Placeholder">
                </div>

                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="text" id="email" name="email" placeholder="Placeholder">
                </div>

                <div class="form-row">
                    <label class="form-label">Message<br>Purpose</label>
                    <fieldset>
                        <div class="radio-group">
                            <label><input type="radio" name="purpose" id="inquiry"> General
                                Inquiry</label>
                            <label><input type="radio" name="purpose" id="reservation"> Reservation
                                Question</label>
                            <label><input type="radio" name="purpose" id="suggestion"> Website
                                Suggestion</label>
                        </div>
                    </fieldset>
                </div>

                <div class="form-row message">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" placeholder="Type here"></textarea>
                </div>

                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" name="subscribe" id="subscribe" checked>Please
                        Subscribe
                        me to the monthly newsletter>
                    </label>
                </div>

                <div class="form-row">
                    <button type="submit">Get in Touch!</button>
                </div>

            </form>
        </div>
        <section>
            <h2>We Are Here to Serve You</h2>
            <div class="employee">
                <figure class="fig">
                    <img src="images/employee1.jpg" alt="Reckless One">
                    <figcaption>Felicia Fancy</figcaption>
                </figure>
                <figure class="fig">
                    <img src="images/employee2.jpg" alt="Reckless Two">
                    <figcaption>Justin Case</figcaption>
                </figure>
                <figure class="fig">
                    <img src="images/employee3.jpg" alt="Reckless Three">
                    <figcaption>Paige Turner</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©️2026 ⛰️ Reckless Abandon Rafting Company ⛰️ RoseDana Supreus</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>

        </nav>
    </footer>

</body>

</html>
